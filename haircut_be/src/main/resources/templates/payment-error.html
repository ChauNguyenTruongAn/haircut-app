<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kết quả thanh toán</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        .result-card {
            max-width: 450px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        .status-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .success { color: #28a745; }
        .failed { color: #dc3545; }
        .error  { color: #ffc107; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card result-card bg-white">
            <div class="card-body">
                <div id="icon" class="status-icon">...</div>
                <h2 id="message" class="card-title mb-3">Đang xử lý...</h2>
                <p id="description" class="card-text text-muted"></p>
                <div id="txnRef" class="mt-3 text-muted small"></div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const txnRef = params.get('txnRef');

        const icon = document.getElementById('icon');
        const message = document.getElementById('message');
        const description = document.getElementById('description');
        const txnRefEl = document.getElementById('txnRef');

        if (txnRef) {
            txnRefEl.innerText = "Mã giao dịch: " + txnRef;
        }

        switch (status) {
            case 'success':
                icon.innerText = '✅';
                icon.classList.add('success');
                message.innerText = 'Thanh toán thành công!';
                description.innerText = 'Giao dịch của bạn đã được xác nhận thành công.';
                break;

            case 'failed':
                icon.innerText = '❌';
                icon.classList.add('failed');
                message.innerText = 'Thanh toán thất bại!';
                description.innerText = 'Giao dịch không thành công. Vui lòng thử lại.';
                break;

            case 'error':
            default:
                icon.innerText = '⚠️';
                icon.classList.add('error');
                message.innerText = 'Đã xảy ra lỗi!';
                description.innerText = 'Không thể xử lý thanh toán. Vui lòng liên hệ hỗ trợ.';
                break;
        }
    </script>
</body>
</html>
